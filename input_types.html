<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>All Input Types</h2>
    <form>
        <!-- First Name -->
        <label> Enter Your Name: </label>
        <input type="text" placeholder="First Name"/>
        <br> <br>
        <!-- Middle Name -->
         <label> Enter Your Middle Name: </label>
        <input type="text" placeholder="Middle Name"/>
        <br> <br>

        <label> Enter Your Last  Name:</label>
        <input type="text" placeholder="last Name"/>
        <br> <br>
        <!-- Email -->
         <label> Email Id:</label>
         <input type="email" placeholder=" Enter Email Id"/>
         <br> <br>
        <!-- Phone Number  -->
         <label> Mobile Number: </label>
        <input type="number" placeholder=" Enter Mobile Number"/>
        <br> <br>
        <!-- Whatsaap Number --> 
         <label> Whatsaap Number: </label>
        <input type="number" placeholder=" Enter Whatsaap Number"/>
        <br> <br>
        <!-- Address -->
          <label> Address: </label>
        <input type="text" placeholder="Enter your address"/>
        <br> <br>
        <!-- Password -->
         <label> Enter Your Password: </label>
        <input type="Password" placeholder="Enter Password"/>
        <br> <br>
        <!-- Date Of Birth -->
        <label> DOB: </label>
        <input type="date" placeholder="Date Of Birth"/>
        
        <!-- Month -->
        <label> Month: </label>
        <input type="Month" placeholder=" Month"/>

         <!-- Week -->
        <label> Week: </label>
        <input type="Week" placeholder=" Week"/>

         <!-- Time -->
        <label> Time: </label>
        <input type="time" placeholder=" time"/>
        
        <!-- Date and Time -->
         <label> Date and Time: </label>
        <input type="datetime-local" placeholder=" datetime"/>
        <br> <br>
        <!-- Select Color -->
        <label> Select Color: </label>
        <input type="color"  />
        <br> <br>
         <!-- Select Range -->
         <label> Select Range: </label>
        <input type="range"  />
        <br> <br>
        <!-- Upload Document -->
        <label> Upload Docs: </label>
        <input type="file"  /> 
        <!-- <br> <br> 
         Upload Multiple Docs -->
        <label> Upload Multiple Docs: </label>
        <input type="file"  multiple/> 
        <br> <br>
        <!-- Search -->
         <label> Search: </label>
        <input type="Search"   /> 
        <br> <br> 
        <!-- Enter URL -->
        <label> Enter URL: </label>
        <input type="url"   /> 
        <br> <br> 
       <!-- Enter Telephone -->
        <label> Enter Telephone: </label>
        <input type="tel"   /> 

         

         
        

      
         
    </form>
    
</body>
</html>
